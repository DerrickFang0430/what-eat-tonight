<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>今天晚上吃什么？</title>
<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
      radial-gradient(circle at top left,#ffffff,#dfe7f5),
      linear-gradient(135deg,#f5f7fa,#c3cfe2);
}
.container{
    width:min(1100px,95vw);
    padding:30px;
    border-radius:30px;
    background:rgba(255,255,255,.6);
    backdrop-filter:blur(30px);
    box-shadow:0 20px 60px rgba(0,0,0,.12);
}
h1{
    text-align:center;
    font-size:40px;
    margin:0 0 30px;
    font-weight:700;
}
.main{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
}
.left{
    flex:1;
    min-width:400px;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}
.pointer{
    position:absolute;
    top:0;
    width:0;
    height:0;
    border-left:24px solid transparent;
    border-right:24px solid transparent;
    border-top:46px solid #ff4d4f;
    z-index:2;
}
canvas{
    border-radius:50%;
    box-shadow:
      0 20px 50px rgba(0,0,0,.15),
      inset 0 0 30px rgba(255,255,255,.4);
}
.right{
    width:300px;
}
.controls{
    display:flex;
    gap:10px;
    margin-bottom:18px;
}
button{
    border:none;
    border-radius:16px;
    padding:14px 18px;
    cursor:pointer;
    font-weight:600;
    transition:.2s;
    flex:1;
}
button:hover{transform:translateY(-2px)}
.green{background:#34c759;color:white}
.red{background:#ff3b30;color:white}

.notice{
    margin-bottom:18px;
    padding:22px;
    border-radius:20px;
    background:rgba(255,255,255,.65);
    backdrop-filter:blur(18px);
    box-shadow:0 8px 30px rgba(0,0,0,.08);
}
.notice-title{
    font-size:15px;
    font-weight:700;
    color:#6b7280;
    margin-bottom:14px;
}
.notice-text{
    font-size:16px;
    line-height:1.7;
    color:#374151;
}
.notice-text span{
    font-weight:700;
    font-size:18px;
    color:#111827;
}

.list{
    max-height:320px;
    overflow:auto;
}
.item{
    background:rgba(255,255,255,.8);
    margin-bottom:8px;
    padding:12px 14px;
    border-radius:14px;
    display:flex;
    justify-content:center;
    font-weight:500;
}

.modal{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.35);
}
.modal-box{
    background:white;
    padding:40px;
    border-radius:24px;
    min-width:320px;
    text-align:center;
    animation:pop .35s ease;
}
@keyframes pop{
    from{transform:scale(.8);opacity:0}
    to{transform:scale(1);opacity:1}
}
.result{
    font-size:30px;
    font-weight:700;
    margin-top:12px;
}
.primary{
    background:#007aff;
    color:white;
    padding:12px 20px;
}
</style>
</head>
<body>
<div class="container">
<h1>今天晚上吃什么？</h1>

<div class="main">
<div class="left">
<div class="pointer"></div>
<canvas id="wheel" width="1200" height="1200" style="width:500px;height:500px;"></canvas>
</div>

<div class="right">
    <div class="controls">
        <button class="green" onclick="startSpin()">抽取</button>
        <button class="red" onclick="requestStop()">停止</button>
    </div>

    <div class="notice">
        <div class="notice-title">菜单管理</div>
        <div class="notice-text">
            如有需求增加或减少选项<br><br>
            请呼叫 <span>Derrick Fang</span>
        </div>
    </div>

    <div class="list" id="list"></div>
</div>
</div>
</div>

<div class="modal" id="modal">
<div class="modal-box">
<div style="font-size:22px">今晚吃：</div>
<div class="result" id="resultText"></div>
<br>
<button class="primary" onclick="closeModal()">确定</button>
</div>
</div>

<script>
let options = [
 "点外卖","烧烤","排骨+土豆","牛肉+洋葱","牛肉+青椒","海鲜"
];

const colors=["#ffd6d6","#ffe8cc","#fff3bf","#d3f9d8","#d0ebff","#e5dbff","#ffd8f0"];
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

let angle=0;
let speed=0;
let spinning=false;
let decelerating=false;

async function loadOptionsFromCloud(){
    try{
        const res = await fetch('./options.json?t=' + Date.now());
        if(!res.ok) throw new Error("读取 options.json 失败");

        const data = await res.json();

        if(Array.isArray(data.options) && data.options.length >= 2){
            options = data.options;
        }

        renderList();
    }catch(err){
        console.error(err);
        renderList();
    }
}

function drawWheel(){
 ctx.clearRect(0,0,1200,1200);

 const cx=600;
 const cy=600;
 const r=560;
 const totalAngle=Math.PI*2;
 const slice=totalAngle/options.length;

 ctx.save();
 ctx.translate(cx,cy);
 ctx.rotate(angle);

 options.forEach((item,i)=>{
   const startAngle=i*slice;
   const endAngle=startAngle+slice;

   ctx.beginPath();
   ctx.moveTo(0,0);
   ctx.arc(0,0,r,startAngle,endAngle);
   ctx.closePath();

   ctx.fillStyle=colors[i%colors.length];
   ctx.fill();

   ctx.strokeStyle="rgba(255,255,255,0.9)";
   ctx.lineWidth=4;
   ctx.stroke();

   ctx.save();
   ctx.rotate(startAngle+slice/2);

   let fontSize=34;
   if(item.length>=5) fontSize=30;
   if(item.length>=7) fontSize=26;
   if(item.length>=9) fontSize=22;

   ctx.fillStyle="#1f2937";
   ctx.font=`600 ${fontSize}px -apple-system, BlinkMacSystemFont, PingFang SC, Microsoft YaHei, sans-serif`;
   ctx.textAlign="center";
   ctx.textBaseline="middle";

   const textRadius=r*0.67;
   ctx.fillText(item,textRadius,0);

   ctx.restore();
 });

 ctx.beginPath();
 ctx.arc(0,0,55,0,Math.PI*2);
 ctx.fillStyle="white";
 ctx.shadowColor="rgba(0,0,0,0.15)";
 ctx.shadowBlur=20;
 ctx.fill();

 ctx.restore();
}

function animate(){
 if(!spinning) return;

 angle += speed;

 if(decelerating){
   speed*=0.985;
   if(speed<0.002){
     spinning=false;
     decelerating=false;
     speed=0;
     showResult();
     return;
   }
 }

 drawWheel();
 requestAnimationFrame(animate);
}

function startSpin(){
 if(spinning) return;
 spinning=true;
 decelerating=false;
 speed=0.25+Math.random()*0.2;
 animate();
}

function requestStop(){
 if(spinning) decelerating=true;
}

function showResult(){
 let normalized=((angle%(Math.PI*2))+(Math.PI*2))%(Math.PI*2);
 let slice=(Math.PI*2)/options.length;
 let index=Math.floor(((Math.PI*2)-normalized)/slice)%options.length;
 document.getElementById("resultText").innerText=options[index];
 document.getElementById("modal").style.display="flex";
}

function closeModal(){
 document.getElementById("modal").style.display="none";
}

function renderList(){
 const list=document.getElementById("list");
 list.innerHTML="";
 options.forEach((item)=>{
   const div=document.createElement("div");
   div.className="item";
   div.innerHTML=`<span>${item}</span>`;
   list.appendChild(div);
 });
 drawWheel();
}

loadOptionsFromCloud();
</script>
</body>
</html>
