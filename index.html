<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>今天晚上吃什么？</title>
<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
      radial-gradient(circle at top left,#ffffff,#dfe7f5),
      linear-gradient(135deg,#f5f7fa,#c3cfe2);
}
.container{
    width:min(1100px,95vw);
    padding:30px;
    border-radius:30px;
    background:rgba(255,255,255,.6);
    backdrop-filter:blur(30px);
    box-shadow:0 20px 60px rgba(0,0,0,.12);
}
h1{
    text-align:center;
    font-size:40px;
    margin:0 0 30px;
    font-weight:700;
}
.main{
    display:flex;
    gap:30px;
    flex-wrap:wrap;
}
.left{
    flex:1;
    min-width:400px;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}
.pointer{
    position:absolute;
    top:0;
    width:0;height:0;
    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-top:40px solid #ff4d4f;
    z-index:2;
}
canvas{
    border-radius:50%;
    box-shadow:
      0 20px 50px rgba(0,0,0,.15),
      inset 0 0 30px rgba(255,255,255,.4);
}
.right{
    width:300px;
}
.controls{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}
input{
    flex:1;
    border:none;
    border-radius:16px;
    padding:14px;
    background:white;
}
button{
    border:none;
    border-radius:16px;
    padding:14px 18px;
    cursor:pointer;
    font-weight:600;
    transition:.2s;
}
button:hover{transform:translateY(-2px)}
.primary{background:#007aff;color:white}
.green{background:#34c759;color:white}
.red{background:#ff3b30;color:white}
.list{
    max-height:320px;
    overflow:auto;
}
.item{
    background:rgba(255,255,255,.8);
    margin-bottom:8px;
    padding:12px 14px;
    border-radius:14px;
    display:flex;
    justify-content:space-between;
}
.modal{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.35);
}
.modal-box{
    background:white;
    padding:40px;
    border-radius:24px;
    min-width:320px;
    text-align:center;
    animation:pop .35s ease;
}
@keyframes pop{
    from{transform:scale(.8);opacity:0}
    to{transform:scale(1);opacity:1}
}
.result{
    font-size:30px;
    font-weight:700;
    margin-top:12px;
}
</style>
</head>
<body>
<div class="container">
<h1>今天晚上吃什么？</h1>

<div class="main">
<div class="left">
<div class="pointer"></div>
<canvas id="wheel" width="500" height="500"></canvas>
</div>

<div class="right">
<div class="controls">
<input id="newItem" placeholder="添加选项"/>
<button class="primary" onclick="addItem()">添加</button>
</div>

<div class="controls">
<button class="green" onclick="startSpin()">抽取</button>
<button class="red" onclick="requestStop()">停止</button>
</div>

<div class="list" id="list"></div>
</div>
</div>
</div>

<div class="modal" id="modal">
<div class="modal-box">
<div style="font-size:22px">今晚吃：</div>
<div class="result" id="resultText"></div>
<br>
<button class="primary" onclick="closeModal()">确定</button>
</div>
</div>

<script>
let options = JSON.parse(localStorage.getItem("food-options")) || [
 "点外卖","烧烤","排骨+土豆","牛肉+洋葱","牛肉+青椒","海鲜"
];

const colors=["#ffd6d6","#ffe8cc","#fff3bf","#d3f9d8","#d0ebff","#e5dbff","#ffd8f0"];
const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

let angle=0;
let speed=0;
let spinning=false;
let decelerating=false;

function save(){
 localStorage.setItem("food-options",JSON.stringify(options));
}

function drawWheel(){
 ctx.clearRect(0,0,500,500);
 const cx=250, cy=250, r=250;
 const slice=2*Math.PI/options.length;

 ctx.save();
 ctx.translate(cx,cy);
 ctx.rotate(angle);

 options.forEach((item,i)=>{
   ctx.beginPath();
   ctx.moveTo(0,0);
   ctx.arc(0,0,r,i*slice,(i+1)*slice);
   ctx.fillStyle=colors[i%colors.length];
   ctx.fill();

   ctx.save();
   ctx.rotate(i*slice+slice/2);
   ctx.fillStyle="#333";
   ctx.font="18px sans-serif";
   ctx.textAlign="right";
   ctx.fillText(item,r-30,5);
   ctx.restore();
 });

 ctx.beginPath();
 ctx.arc(0,0,30,0,Math.PI*2);
 ctx.fillStyle="white";
 ctx.fill();
 ctx.restore();
}

function animate(){
 if(!spinning) return;

 angle += speed;

 if(decelerating){
   speed*=0.985;
   if(speed<0.002){
     spinning=false;
     decelerating=false;
     speed=0;
     showResult();
     return;
   }
 }

 drawWheel();
 requestAnimationFrame(animate);
}

function startSpin(){
 if(spinning) return;
 spinning=true;
 decelerating=false;
 speed=0.25+Math.random()*0.2;
 animate();
}

function requestStop(){
 if(spinning) decelerating=true;
}

function showResult(){
 let normalized=((angle%(Math.PI*2))+(Math.PI*2))%(Math.PI*2);
 let slice=(Math.PI*2)/options.length;
 let index=Math.floor(((Math.PI*2)-normalized)/slice)%options.length;
 document.getElementById("resultText").innerText=options[index];
 document.getElementById("modal").style.display="flex";
}

function closeModal(){
 document.getElementById("modal").style.display="none";
}

function addItem(){
 const input=document.getElementById("newItem");
 const val=input.value.trim();
 if(!val) return;
 options.push(val);
 input.value="";
 save();
 renderList();
}

function removeItem(i){
 if(options.length<=2){
   alert("至少保留两个选项");
   return;
 }
 options.splice(i,1);
 save();
 renderList();
}

function renderList(){
 const list=document.getElementById("list");
 list.innerHTML="";
 options.forEach((item,i)=>{
   const div=document.createElement("div");
   div.className="item";
   div.innerHTML=`<span>${item}</span>
   <button onclick="removeItem(${i})">删</button>`;
   list.appendChild(div);
 });
 drawWheel();
}

renderList();
</script>
</body>
</html>
