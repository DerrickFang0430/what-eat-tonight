<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>今天晚上吃什么？</title>
<style>
*{box-sizing:border-box} html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;background:
radial-gradient(circle at 15% 20%, rgba(255,255,255,.9), transparent 25%),
radial-gradient(circle at 80% 30%, rgba(173,216,255,.5), transparent 28%),
radial-gradient(circle at 70% 80%, rgba(255,182,193,.45), transparent 30%),
linear-gradient(135deg,#dfe9f3,#ffffff);}
.container{width:min(1200px,95vw);padding:28px;border-radius:32px;background:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.6);backdrop-filter:blur(35px) saturate(180%);box-shadow:0 30px 80px rgba(0,0,0,.12), inset 0 1px 1px rgba(255,255,255,.8);}
h1{text-align:center;font-size:42px;margin:0 0 24px;font-weight:800}
.main{display:flex;gap:30px;flex-wrap:wrap}
.left{flex:1;min-width:0;display:flex;justify-content:center;align-items:center;position:relative}
.pointer{position:absolute;top:0;width:0;height:0;border-left:24px solid transparent;border-right:24px solid transparent;border-top:46px solid #ff4d4f;z-index:10}
.wheel-canvas{width:min(500px,90vw);height:min(500px,90vw);border-radius:50%;box-shadow:0 20px 60px rgba(0,0,0,.18), inset 0 0 40px rgba(255,255,255,.35)}
.right{width:320px}
.controls{display:flex;gap:12px;margin-bottom:18px}
button{border:none;border-radius:18px;padding:14px 18px;cursor:pointer;font-weight:700;transition:.25s;flex:1}
.green{background:#34c759;color:#fff}.red{background:#ff4d4f;color:#fff}.primary{background:#007aff;color:#fff;padding:12px 20px}
.notice,.item{background:rgba(255,255,255,.42);border:1px solid rgba(255,255,255,.6);backdrop-filter:blur(25px)}
.notice{margin-bottom:18px;padding:22px;border-radius:22px}
.list{max-height:320px;overflow:auto}
.item{margin-bottom:8px;padding:14px;border-radius:16px;display:flex;justify-content:center;font-weight:600}
.modal{position:fixed;inset:0;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,.35);backdrop-filter:blur(8px)}
.modal-box{background:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.7);backdrop-filter:blur(30px);padding:40px;border-radius:28px;min-width:320px;text-align:center}
.result{font-size:34px;font-weight:800;margin-top:12px}
@media (max-width:768px){.main{flex-direction:column}.right{width:100%}.pointer{border-left:18px solid transparent;border-right:18px solid transparent;border-top:34px solid #ff4d4f}}
</style></head>
<body>
<div class="container"><h1>今天晚上吃什么？</h1>
<div class="main">
<div class="left"><div class="pointer"></div><canvas id="wheel" class="wheel-canvas" width="1200" height="1200"></canvas></div>
<div class="right">
<div class="controls"><button class="green" onclick="startSpin()">抽取</button><button class="red" onclick="requestStop()">停止</button></div>
<div class="notice">如有需求增加或减少选项<br><br>请呼叫 <b>Derrick Fang</b></div>
<div class="list" id="list"></div>
</div></div></div>
<div class="modal" id="modal"><div class="modal-box"><div style="font-size:22px">今晚吃：</div><div class="result" id="resultText"></div><br><button class="primary" onclick="closeModal()">确定</button></div></div>
<script>
let options=["点外卖","烧烤","排骨+土豆","牛肉+洋葱","牛肉+青椒","海鲜"];
const colors=["#ffd6d6","#ffe8cc","#fff3bf","#d3f9d8","#d0ebff","#e5dbff","#ffd8f0"];
const canvas=document.getElementById("wheel"),ctx=canvas.getContext("2d");
let angle=0,spinning=false,stopping=false,winnerIndex=null;
async function loadOptionsFromCloud(){try{const r=await fetch('./options.json?t='+Date.now());const d=await r.json();if(Array.isArray(d.options)&&d.options.length>=2)options=d.options;}catch(e){}renderList();}
function drawWheel(){ctx.clearRect(0,0,1200,1200);const cx=600,cy=600,r=560,full=Math.PI*2,slice=full/options.length;ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);options.forEach((item,i)=>{const s=i*slice,e=s+slice;ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,s,e);ctx.closePath();ctx.fillStyle=colors[i%colors.length];ctx.fill();ctx.strokeStyle="rgba(255,255,255,.9)";ctx.lineWidth=4;ctx.stroke();ctx.save();ctx.rotate(s+slice/2);ctx.fillStyle="#1f2937";ctx.font="600 30px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(item,r*0.67,0);ctx.restore();});ctx.beginPath();ctx.arc(0,0,55,0,full);ctx.fillStyle="white";ctx.fill();ctx.restore();}
function spinLoop(){if(!spinning||stopping)return;angle+=0.28;drawWheel();requestAnimationFrame(spinLoop);}
function startSpin(){if(spinning)return;spinning=true;stopping=false;spinLoop();}
function requestStop(){if(!spinning||stopping)return;stopping=true;winnerIndex=Math.floor(Math.random()*options.length);stopAtWinner();}
function stopAtWinner(){const full=Math.PI*2,slice=full/options.length,pointer=3*Math.PI/2,target=(winnerIndex*slice)+(slice/2);let targetAngle=(pointer-target)%full;if(targetAngle<0)targetAngle+=full;let current=((angle%full)+full)%full;let delta=targetAngle-current;if(delta<0)delta+=full;const finalAngle=angle+delta+full*6,startAngle=angle,startTime=performance.now(),duration=3000;
function anim(now){const t=Math.min((now-startTime)/duration,1),e=1-Math.pow(1-t,3);angle=startAngle+(finalAngle-startAngle)*e;drawWheel();if(t<1)requestAnimationFrame(anim);else{angle=finalAngle;drawWheel();spinning=false;stopping=false;showResult();}}
requestAnimationFrame(anim);}
function showResult(){document.getElementById("resultText").innerText=options[winnerIndex];document.getElementById("modal").style.display="flex";}
function closeModal(){document.getElementById("modal").style.display="none";}
function renderList(){const list=document.getElementById("list");list.innerHTML="";options.forEach(item=>{const div=document.createElement("div");div.className="item";div.innerHTML=`<span>${item}</span>`;list.appendChild(div);});drawWheel();}
loadOptionsFromCloud();
</script></body></html>
